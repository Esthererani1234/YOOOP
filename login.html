<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in — YOOOP</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body class="auth-page"><main class="auth-card"><a class="brand" style="color:#0874e4" href="index.html">YOOOP<span class="spark">✦</span></a><h1>Sign in</h1><p class="muted">Access orders, messages, saved addresses, and customer support.</p><form class="stack-form" onsubmit="login(event)"><input name="email" type="email" required placeholder="Email address"><input name="name" placeholder="Your name"><input name="password" type="password" required placeholder="Password"><button class="btn btn-blue">Continue</button></form><div class="divider"><span>New to YOOOP?</span></div><details><summary><b>Create an account</b></summary><form class="stack-form" style="margin-top:15px" onsubmit="register(event)"><input name="first" required placeholder="First name"><input name="last" required placeholder="Last name"><input name="email" type="email" required placeholder="Email address"><input name="password" type="password" required placeholder="Create password"><button class="btn btn-outline">Create account</button></form></details><p class="notice" style="margin-top:18px">Demo login only. Information is stored on this device and no real authentication service is connected yet.</p></main><script src="app.js"></script></body></html>
