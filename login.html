<!doctype html><html><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in — YOOOP</title><link rel="stylesheet" href="styles.css"><link rel="stylesheet" href="enterprise.css"></head><body class="auth-bg"><main class="auth-shell"><a class="logo auth-logo" href="index.html">YOOOP</a><section class="auth-card"><h1>Sign in</h1><p class="subtle">Access orders, messages, saved addresses, and support.</p><form onsubmit="login(event)" class="stack-form"><input name="email" type="email" required placeholder="Email address"><input name="name" placeholder="Your name"><input name="password" type="password" required placeholder="Password"><button class="enterprise-primary">Continue</button></form><div class="divider"><span>New to YOOOP?</span></div><details><summary>Create an account</summary><form onsubmit="register(event)" class="stack-form register-form"><div class="two"><input name="first" required placeholder="First name"><input name="last" required placeholder="Last name"></div><input name="email" type="email" required placeholder="Email address"><input name="password" type="password" required placeholder="Create password"><button class="secondary-btn">Create account</button></form></details><p class="legal">Demo login stores information only on this device. No real password service is connected yet.</p></section></main><script src="enterprise.js"></script></body></html>
