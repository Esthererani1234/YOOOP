<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Sign in — YOOOP</title><link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet"><link rel="stylesheet" href="styles.css"></head><body class="auth-page"><main class="auth-card"><a class="brand" style="color:#0874e4" href="index.html">YOOOP<span class="spark">✦</span></a><h1>Sign in</h1><p class="muted">Access orders, messages, saved addresses, and customer support.</p><form class="stack-form" onsubmit="login(event)"><input name="email" type="email" required autocomplete="email" placeholder="Email address"><input name="password" type="password" required minlength="8" autocomplete="current-password" placeholder="Password"><button class="btn btn-blue" type="submit">Continue</button></form><div class="divider"><span>New to YOOOP?</span></div><details><summary><b>Create an account</b></summary><form class="stack-form" style="margin-top:15px" onsubmit="register(event)"><input name="first" required autocomplete="given-name" placeholder="First name"><input name="last" required autocomplete="family-name" placeholder="Last name"><input name="email" type="email" required autocomplete="email" placeholder="Email address"><input name="password" type="password" required minlength="8" autocomplete="new-password" placeholder="Create password (8+ characters)"><button class="btn btn-outline" type="submit">Create account</button></form></details><div id="authMessage" class="notice" style="margin-top:18px">Secure account access is powered by Supabase Auth once the project keys are connected.</div></main><script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script><script src="app.js"></script><script src="supabase-client.js"></script></body></html>
